<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HabeshaGo Merchant Portal</title>
    <style>
      :root { --green:#0f5132; --ink:#172026; --muted:#60717d; --line:#d9e0e4; --gold:#c58a21; --bg:#f6f8f9; }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: Arial, sans-serif; background: var(--bg); color: var(--ink); }
      header { background: var(--green); color: white; padding: 18px 28px; display:flex; justify-content:space-between; gap:16px; align-items:center; }
      main { max-width: 1220px; margin: 22px auto; padding: 0 18px; display: grid; gap: 16px; }
      section { background: white; border: 1px solid var(--line); border-radius: 8px; padding: 16px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 12px; }
      .metric, .card { border: 1px solid var(--line); border-radius: 8px; padding: 12px; background:#fff; }
      .metric strong { display:block; font-size:24px; }
      .metric span, small, p { color: var(--muted); }
      label { display:grid; gap:5px; font-size:13px; color:var(--muted); }
      input, select { width:100%; border:1px solid var(--line); border-radius:6px; padding:9px; color:var(--ink); }
      button { border:0; border-radius:6px; background:var(--green); color:white; padding:9px 12px; cursor:pointer; }
      button.secondary { background:#24435f; }
      button.warn { background:#8a4b07; }
      button.danger { background:#9b1c1c; }
      table { width:100%; border-collapse: collapse; font-size:14px; }
      th, td { text-align:left; border-bottom:1px solid #e7ecef; padding:9px; vertical-align:top; }
      th { color:var(--muted); font-size:12px; text-transform:uppercase; }
      .actions { display:flex; flex-wrap:wrap; gap:6px; }
      .bar { display:flex; flex-wrap:wrap; gap:10px; align-items:end; }
      .product-editor { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:8px; min-width:520px; }
      .product-editor button { align-self:end; }
      #toast { position:fixed; right:16px; bottom:16px; background:#172026; color:white; padding:10px 12px; border-radius:8px; opacity:0; transition:.2s; }
      #toast.show { opacity:1; }
      .action-status { position:fixed; left:16px; right:16px; bottom:16px; z-index:30; max-height:220px; overflow:auto; border:1px solid var(--line); border-radius:8px; background:white; box-shadow:0 12px 30px rgba(23,32,38,.18); padding:12px; font-size:13px; }
      .action-status strong { display:block; margin-bottom:4px; }
      .action-status pre { white-space:pre-wrap; margin:6px 0 0; color:var(--muted); }
      .action-status.success { border-color:rgba(15,81,50,.35); }
      .action-status.error { border-color:rgba(155,28,28,.4); background:#fff7f7; }
    </style>
  </head>
  <body>
    <header>
      <div>
        <h1>HabeshaGo Merchant Portal</h1>
        <p>Profile, menu, incoming orders, preparation, payout, and support operations.</p>
      </div>
      <div class="actions">
        <button id="loginBtn">Demo Merchant Login</button>
        <a href="/" style="color:white">Customer app</a>
        <a href="/admin" style="color:white">Admin portal</a>
      </div>
    </header>
    <main>
      <section class="bar">
        <label>Email <input id="email" value="merchant@habeshago.local" /></label>
        <label>Password <input id="password" type="password" value="Merchant123!" /></label>
        <button id="manualLoginBtn">Login</button>
        <button id="refreshBtn" class="secondary">Refresh</button>
        <span id="session">Not signed in</span>
      </section>

      <section id="metrics" class="grid"></section>

      <section>
        <h2>Restaurant/store Profile Setup</h2>
        <div class="grid">
          <label>Business name <input id="merchantName" /></label>
          <label>Category <input id="merchantCategory" /></label>
          <label>Manager <input id="managerName" /></label>
          <label>Phone <input id="contactPhone" /></label>
          <label>Opening hours <input id="openingHours" /></label>
          <label>Address <input id="addressNote" /></label>
          <label>Prep minutes <input id="prepTime" type="number" /></label>
          <label>Delivery radius km <input id="deliveryRadius" type="number" /></label>
        </div>
        <p id="profileMeta"></p>
        <button id="saveProfileBtn">Save profile</button>
      </section>

      <section>
        <h2>Menu/Product Management</h2>
        <div class="bar">
          <label>Name <input id="newProductName" value="New lunch special" /></label>
          <label>Category <input id="newProductCategory" value="food" /></label>
          <label>Description <input id="newProductDescription" value="Merchant-created local demo product." /></label>
          <label>Price <input id="newProductPrice" type="number" value="250" /></label>
          <label>Stock <input id="newProductStock" type="number" value="10" /></label>
          <label>Prep minutes <input id="newProductPrep" type="number" value="15" /></label>
          <button id="addProductBtn">Add product</button>
        </div>
        <div id="products"></div>
      </section>

      <section>
        <h2>Incoming Order Dashboard</h2>
        <div id="orders"></div>
      </section>

      <section class="grid">
        <div class="card">
          <h2>Payout/Wallet Summary</h2>
          <div id="payout"></div>
        </div>
        <div class="card">
          <h2>Support/contact Admin</h2>
          <label>Subject <input id="supportSubject" value="Merchant support request" /></label>
          <button id="supportBtn" class="secondary">Create support ticket</button>
          <div id="supportTickets"></div>
        </div>
      </section>
    </main>
    <div id="toast"></div>
    <script>
      function resolveApiBaseUrl() {
        const host = window.location.hostname;
        if (host === "localhost" || host === "127.0.0.1") return "http://localhost:4000/api/ET/v1";
        return "https://api.habeshago.com/api/ET/v1";
      }
      const API_BASE_URL = resolveApiBaseUrl();
      const state = { country: "ET", token: localStorage.getItem("hg_merchant_token") || "", user: JSON.parse(localStorage.getItem("hg_merchant_user") || "null"), merchant: null, data: null, lastApi: null };
      const $ = (id) => document.querySelector(id);
      const money = (n, c = "ETB") => `${Number(n || 0).toLocaleString()} ${c}`;
      function toast(message) { const el = $("#toast"); el.textContent = message; el.classList.add("show"); setTimeout(() => el.classList.remove("show"), 2200); }
      function apiUrl(path) {
        if (path.startsWith(API_BASE_URL)) return path;
        if (path.startsWith("http")) return path;
        let normalized = path;
        normalized = normalized.replace(/^\/api\/[^/]+\/v1/i, "");
        normalized = normalized.replace(/^\/api\/admin/i, "/admin");
        if (!normalized.startsWith("/")) normalized = `/${normalized}`;
        return `${API_BASE_URL}${normalized}`;
      }
      async function api(path, options = {}) {
        const headers = { "Content-Type": "application/json", ...(options.headers || {}) };
        if (state.token) headers.Authorization = `Bearer ${state.token}`;
        const url = apiUrl(path);
        const payload = options.body ? JSON.parse(options.body) : null;
        console.log("API URL:", url);
        console.log("Payload:", payload);
        const response = await fetch(url, { ...options, headers });
        const data = await response.json().catch(() => ({}));
        state.lastApi = { status: response.status, body: data, url };
        console.log("Status:", response.status);
        console.log("Response:", data);
        if (!response.ok) throw new Error(`Status ${response.status}: ${data.error || "Request failed"}`);
        return data;
      }
      function actionPanel() {
        let panel = $("#actionStatus");
        if (!panel) {
          panel = document.createElement("section");
          panel.id = "actionStatus";
          panel.className = "action-status";
          panel.hidden = true;
          document.body.appendChild(panel);
        }
        return panel;
      }
      function showActionStatus({ title, message, type = "", response = state.lastApi }) {
        const panel = actionPanel();
        panel.hidden = false;
        panel.className = `action-status ${type}`.trim();
        panel.innerHTML = `<strong>${title}</strong><div>${message}</div><div>Backend response status: ${response?.status ?? "No backend request yet"}</div><pre>Backend response body: ${JSON.stringify(response?.body ?? {}, null, 2)}</pre>`;
      }
      async function runButtonAction(button, label, action) {
        const originalText = button?.textContent;
        try {
          if (button) { button.disabled = true; button.textContent = "Loading..."; }
          showActionStatus({ title: label, message: "Loading...", response: null });
          const result = await action();
          showActionStatus({ title: label, message: "Success", type: "success" });
          toast(`${label}: success`);
          return result;
        } catch (error) {
          showActionStatus({ title: label, message: `Error: ${error.message}`, type: "error" });
          toast(error.message);
          throw error;
        } finally {
          if (button) { button.disabled = false; button.textContent = originalText; }
        }
      }
      function table(rows, columns, actions) {
        if (!rows.length) return "<div class='card'>No records yet.</div>";
        return `<table><thead><tr>${columns.map(c => `<th>${c.label}</th>`).join("")}<th>Actions</th></tr></thead><tbody>${rows.map(row => `<tr>${columns.map(c => `<td>${c.render ? c.render(row) : row[c.key]}</td>`).join("")}<td><div class="actions">${actions ? actions(row) : ""}</div></td></tr>`).join("")}</tbody></table>`;
      }
      function esc(value = "") {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[ch]));
      }
      async function login() {
        const data = await api(`${API_BASE_URL}/auth/login`, { method:"POST", body: JSON.stringify({ email: $("#email").value, password: $("#password").value }) });
        state.token = data.token;
        state.user = data.user;
        localStorage.setItem("hg_merchant_token", state.token);
        localStorage.setItem("hg_merchant_user", JSON.stringify(state.user));
        $("#session").textContent = `${data.user.name} (${data.user.role})`;
        await load();
      }
      async function restoreSession() {
        if (!state.token) return;
        try {
          const data = await api(`${API_BASE_URL}/auth/me`);
          state.user = data.user;
          localStorage.setItem("hg_merchant_user", JSON.stringify(data.user));
          $("#session").textContent = `${data.user.name} (${data.user.role})`;
        } catch {
          state.token = "";
          state.user = null;
          localStorage.removeItem("hg_merchant_token");
          localStorage.removeItem("hg_merchant_user");
          $("#session").textContent = "Session expired";
        }
      }
      async function load() {
        if (!state.token) return;
        const data = await api(`/api/${state.country}/v1/merchant/dashboard`);
        state.data = data;
        state.merchant = data.merchant;
        render(data);
      }
      function render(data) {
        const m = data.merchant;
        $("#merchantName").value = m.name || "";
        $("#merchantCategory").value = m.category || "";
        $("#managerName").value = m.manager_name || "";
        $("#contactPhone").value = m.contact_phone || "";
        $("#openingHours").value = m.opening_hours || "";
        $("#addressNote").value = m.address_note || "";
        $("#prepTime").value = m.prep_time_minutes || 15;
        $("#deliveryRadius").value = m.delivery_radius_km || 3;
        $("#profileMeta").textContent = `${m.verification_status} - ${m.status} - commission ${Math.round(Number(m.commission_rate || 0) * 100)}%`;
        $("#metrics").innerHTML = [
          ["Open orders", data.payout.open_orders],
          ["Completed", data.payout.completed_orders],
          ["Gross sales", money(data.payout.gross_sales, data.payout.currency)],
          ["Payout pending", money(data.payout.payout_pending, data.payout.currency)]
        ].map(([label, value]) => `<div class="metric"><strong>${value}</strong><span>${label}</span></div>`).join("");
        $("#products").innerHTML = table(data.products, [
          { label:"Product editor", render:p => `
            <div class="product-editor" data-product-row="${p.id}">
              <label>Name <input data-field="name" value="${esc(p.name)}" /></label>
              <label>Category <input data-field="category" value="${esc(p.category)}" /></label>
              <label>Description <input data-field="description" value="${esc(p.description || "")}" /></label>
              <label>Price <input data-field="price" type="number" value="${Number(p.price || 0)}" /></label>
              <label>Stock <input data-field="stock_quantity" type="number" value="${Number(p.stock_quantity || 0)}" /></label>
              <label>Prep <input data-field="prep_time_minutes" type="number" value="${Number(p.prep_time_minutes || 15)}" /></label>
            </div>
          ` },
          { label:"Available", render:p => p.available ? "Yes" : "No" },
          { label:"Currency", key:"currency" }
        ], p => `<button data-edit-product="${p.id}">Save edit</button><button class="secondary" data-toggle="${p.id}">${p.available ? "Disable" : "Enable"}</button>`);
        $("#orders").innerHTML = table(data.orders, [
          { label:"Order", render:o => o.id.slice(0,8) },
          { label:"Customer", key:"customer_name" },
          { label:"Status", key:"status" },
          { label:"Total", render:o => money(o.total, o.currency) },
          { label:"Address", key:"address_note" }
        ], orderActions);
        $("#payout").innerHTML = `
          <p>Gross sales: ${money(data.payout.gross_sales, data.payout.currency)}</p>
          <p>Commission due: ${money(data.payout.commission_due, data.payout.currency)}</p>
          <p>Pending payout: ${money(data.payout.payout_pending, data.payout.currency)}</p>
          <p>Open orders: ${data.payout.open_orders}</p>
          <p>Completed orders: ${data.payout.completed_orders}</p>
          <p>Payout schedule: ${m.payout_schedule || "weekly"}</p>
          <p>Wallet ledger: simulated payout summary only; no real money moved.</p>
        `;
        $("#supportTickets").innerHTML = data.support_tickets.map(t => `<p>${t.subject} - ${t.status}</p>`).join("") || "<p>No support tickets yet.</p>";
        bindRows();
      }
      function orderActions(o) {
        if (o.status === "placed") return `<button data-status="${o.id}|accepted">Accept</button><button class="warn" data-status="${o.id}|rejected">Reject</button>`;
        if (o.status === "accepted") return `<button data-status="${o.id}|preparing">Start prep</button>`;
        if (o.status === "preparing") return `<button data-status="${o.id}|ready_for_pickup">Food ready</button>`;
        if (o.status === "ready_for_pickup") return `<button data-dispatch="${o.id}">Request driver</button>`;
        return "";
      }
      function bindRows() {
        document.querySelectorAll("[data-status]").forEach(btn => btn.onclick = () => runButtonAction(btn, "Update order status", async () => {
          const [id, status] = btn.dataset.status.split("|");
          await api(`/api/${state.country}/v1/orders/${id}/status`, { method:"PATCH", body: JSON.stringify({ status }) });
          toast("Order updated");
          await load();
        }).catch(() => {}));
        document.querySelectorAll("[data-dispatch]").forEach(btn => btn.onclick = () => runButtonAction(btn, "Request driver", async () => {
          await api(`/api/${state.country}/v1/orders/${btn.dataset.dispatch}/request-driver`, { method:"POST", body:"{}" });
          toast("Driver requested");
          await load();
        }).catch(() => {}));
        document.querySelectorAll("[data-toggle]").forEach(btn => btn.onclick = () => runButtonAction(btn, "Toggle product availability", async () => {
          const product = state.data.products.find(p => p.id === btn.dataset.toggle);
          await api(`/api/${state.country}/v1/products/${product.id}`, { method:"PATCH", body: JSON.stringify({ available: !product.available }) });
          await load();
        }).catch(() => {}));
        document.querySelectorAll("[data-edit-product]").forEach(btn => btn.onclick = () => runButtonAction(btn, "Edit product", async () => {
          const row = document.querySelector(`[data-product-row="${btn.dataset.editProduct}"]`);
          const body = {};
          row.querySelectorAll("[data-field]").forEach((input) => {
            body[input.dataset.field] = ["price", "stock_quantity", "prep_time_minutes"].includes(input.dataset.field) ? Number(input.value) : input.value;
          });
          await api(`/api/${state.country}/v1/products/${btn.dataset.editProduct}`, { method:"PATCH", body: JSON.stringify(body) });
          await load();
        }).catch(() => {}));
      }
      $("#loginBtn").onclick = () => runButtonAction($("#loginBtn"), "Merchant demo login", login).catch(() => {});
      $("#manualLoginBtn").onclick = () => runButtonAction($("#manualLoginBtn"), "Merchant login", login).catch(() => {});
      $("#refreshBtn").onclick = () => runButtonAction($("#refreshBtn"), "Refresh merchant dashboard", load).catch(() => {});
      $("#saveProfileBtn").onclick = () => runButtonAction($("#saveProfileBtn"), "Save merchant profile", async () => {
        const body = { name: $("#merchantName").value, category: $("#merchantCategory").value, manager_name: $("#managerName").value, contact_phone: $("#contactPhone").value, opening_hours: $("#openingHours").value, address_note: $("#addressNote").value, prep_time_minutes: Number($("#prepTime").value), delivery_radius_km: Number($("#deliveryRadius").value) };
        await api(`/api/${state.country}/v1/merchants/${state.merchant.id}/profile`, { method:"PATCH", body: JSON.stringify(body) });
        toast("Profile saved");
        await load();
      }).catch(() => {});
      $("#addProductBtn").onclick = () => runButtonAction($("#addProductBtn"), "Add product", async () => {
        await api(`/api/${state.country}/v1/merchants/${state.merchant.id}/products`, { method:"POST", body: JSON.stringify({ name: $("#newProductName").value, category: $("#newProductCategory").value, description: $("#newProductDescription").value, price: Number($("#newProductPrice").value), stock_quantity: Number($("#newProductStock").value), prep_time_minutes: Number($("#newProductPrep").value) }) });
        toast("Product added");
        await load();
      }).catch(() => {});
      $("#supportBtn").onclick = () => runButtonAction($("#supportBtn"), "Create support ticket", async () => {
        await api(`/api/${state.country}/v1/support/tickets`, { method:"POST", body: JSON.stringify({ subject: $("#supportSubject").value, priority:"normal" }) });
        toast("Support ticket created");
        await load();
      }).catch(() => {});
      if (state.user) $("#session").textContent = `${state.user.name} (${state.user.role})`;
      if (state.token) restoreSession().then(() => load()).catch(e => toast(e.message));
    </script>
  </body>
</html>
